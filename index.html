<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHOOP Dashboard — Angela</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f; --card:#14141f; --card2:#1c1c2e;
  --teal:#00e5cc; --purple:#b794f6; --pink:#ff6b9d;
  --text:#e8e8f0; --muted:#8a8aa3; --border:#2a2a40;
  --green:#00d9a3; --yellow:#ffcc4d; --red:#ff5c7a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}

/* animated gradient background */
body::before{
  content:'';position:fixed;top:-30%;left:-20%;width:70%;height:70%;
  background:radial-gradient(ellipse at center, rgba(0,229,204,.06) 0%, transparent 70%);
  animation:float1 20s ease-in-out infinite;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-30%;right:-20%;width:60%;height:60%;
  background:radial-gradient(ellipse at center, rgba(183,148,246,.05) 0%, transparent 70%);
  animation:float2 25s ease-in-out infinite reverse;
  pointer-events:none;z-index:0;
}
@keyframes float1{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.08)}
  66%{transform:translate(-20px,20px) scale(0.95)}
}
@keyframes float2{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-30px,-40px) scale(1.12)}
}

.wrap{max-width:1100px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1}

/* header */
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;flex-wrap:wrap;gap:12px;
  animation:fadeUp .6s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)}}
h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.02em}
h1 span{
  background:linear-gradient(135deg, var(--teal), var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{color:var(--muted);font-size:.9rem;margin-top:4px}
.updated{font-size:.8rem;color:var(--muted)}

/* pulse dot */
.pulse-dot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:6px;position:relative;vertical-align:middle}
.pulse-dot::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--green);opacity:.5;
  animation:pulseRing 2s ease-out infinite;
}
@keyframes pulseRing{0%{transform:scale(.7);opacity:.6} 100%{transform:scale(1.8);opacity:0}}

/* stat cards */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;
  animation:fadeUp .6s ease-out backwards;
  transition:transform .25s ease, border-color .25s ease;
}
.stat-card:nth-child(1){animation-delay:.05s}
.stat-card:nth-child(2){animation-delay:.10s}
.stat-card:nth-child(3){animation-delay:.15s}
.stat-card:nth-child(4){animation-delay:.20s}
.stat-card:hover{transform:translateY(-3px);border-color:#3a3a55}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--teal), transparent);
  opacity:0;transition:opacity .3s;
}
.stat-card:hover::before{opacity:1}
.stat-label{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:600;
  animation:countUp .8s ease-out backwards}
@keyframes countUp{from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}}
.stat-sub{font-size:.8rem;color:var(--muted);margin-top:4px}

/* chart cards */
.chart-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 20px 14px;margin-bottom:16px;
  animation:fadeUp .6s ease-out backwards;
  transition:border-color .25s ease;
}
.chart-card:hover{border-color:#3a3a55}
.chart-card:nth-of-type(1){animation-delay:.25s}
.chart-card:nth-of-type(2){animation-delay:.3s}
.chart-card:nth-of-type(3){animation-delay:.35s}
.chart-title{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:300px}

/* mini sparkline shimmer */
.spark{width:36px;height:14px;opacity:.5}
.spark path{fill:none;stroke:var(--teal);stroke-width:1.5;
  stroke-dasharray:60;stroke-dashoffset:60;
  animation:sparkDraw 1.2s ease-out .4s forwards}
@keyframes sparkDraw{to{stroke-dashoffset:0}}

/* footer */
footer{text-align:center;color:var(--muted);font-size:.8rem;margin-top:36px;animation:fadeUp .6s ease-out .5s backwards}
footer a{color:var(--teal);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--purple)}
.heart{display:inline-block;animation:heartbeat 1.6s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)} 14%{transform:scale(1.2)} 28%{transform:scale(1)}}

/* badges */
.badge{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.72rem;color:var(--muted);margin-left:8px}
.recovery-green{color:var(--green)} .recovery-yellow{color:var(--yellow)} .recovery-red{color:var(--red)}

/* responsive */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr} h1{font-size:1.5rem} .stat-value{font-size:1.6rem}}

/* reduced motion */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>WHOOP <span>Dashboard</span></h1>
    <div class="subtitle">Angela Hudson · <span id="dateRange">—</span></div>
  </div>
  <div class="updated"><span class="pulse-dot"></span>Updated <span id="updatedAt">—</span> <span class="badge" id="dataCount">—</span></div>
</header>

<div class="grid" id="statGrid"></div>

<div class="chart-card" style="animation-delay:.25s">
  <div class="chart-title">Strain · Daily Cardiovascular Load
    <svg class="spark" viewBox="0 0 36 14"><path d="M1,10 L6,7 L11,9 L16,4 L21,6 L26,3 L31,5 L35,2"/></svg>
  </div>
  <div class="chart-wrap"><canvas id="strainChart"></canvas></div>
</div>

<div class="two-col">
  <div class="chart-card" style="animation-delay:.3s">
    <div class="chart-title">Recovery %</div>
    <div class="chart-wrap" style="height:220px"><canvas id="recoveryChart"></canvas></div>
  </div>
  <div class="chart-card" style="animation-delay:.35s">
    <div class="chart-title">HRV · Resting HR</div>
    <div class="chart-wrap" style="height:220px"><canvas id="hrvChart"></canvas></div>
  </div>
</div>

<div class="chart-card" style="animation-delay:.4s">
  <div class="chart-title">Sleep Performance</div>
  <div class="chart-wrap"><canvas id="sleepChart"></canvas></div>
</div>

<footer>
  Built with <span class="heart">💚</span> 🐆 · <a href="https://github.com/DaCameraGirl/whoop-dashboard" target="_blank">github.com/DaCameraGirl/whoop-dashboard</a><br>
  Auto-updates daily via GitHub Actions
</footer>
</div>

<script>
const TEAL='#00e5cc', PURPLE='#b794f6', PINK='#ff6b9d', GREEN='#00d9a3', YELLOW='#ffcc4d', RED='#ff5c7a', GRID='#2a2a40', MUTED='#8a8aa3';
Chart.defaults.color=MUTED;
Chart.defaults.font.family="'DM Sans',system-ui,sans-serif";

fetch('data/whoop.json').then(r=>r.json()).then(d=>{
  const cycles=(d.cycles||[]).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const recovery=(d.recovery||[]).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const sleep=(d.sleep||[]).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const workouts=d.workouts||[];

  const fmt=n=>n.toLocaleString('en-US',{month:'short',day:'numeric'});
  const cLabels=cycles.map(x=>fmt(new Date(x.start)));
  const rLabels=recovery.map(x=>fmt(new Date(x.created_at)));
  
  if(cycles.length){document.getElementById('dateRange').textContent=
    fmt(new Date(cycles[0].start))+' – '+fmt(new Date(cycles[cycles.length-1].start))};
  document.getElementById('updatedAt').textContent = d.generated_at ? new Date(d.generated_at).toLocaleString() : '—';
  document.getElementById('dataCount').textContent = cycles.length+' days';

  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const cStrain = cycles.map(x=>x.score?.strain||0);
  const rScore = recovery.map(x=>x.score?.recovery_score||0);
  const hrvVals = recovery.map(x=>x.score?.hrv_rmssd_milli||0).filter(Boolean);
  const sleepHrs = sleep.filter(s=>!s.score?.nap).map(s=>{
    const st=s.score?.stage_summary||{}; return Object.values(st).reduce((a,b)=>a+b,0)/3600000;
  });
  const lastRecovery = rScore[rScore.length-1]||0;
  const recClass = lastRecovery>=66?'recovery-green':lastRecovery>=34?'recovery-yellow':'recovery-red';
  
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Avg Strain</div><div class="stat-value">${avg(cStrain).toFixed(1)}</div><div class="stat-sub">${cycles.length} days tracked</div></div>
    <div class="stat-card"><div class="stat-label">Recovery</div><div class="stat-value ${recClass}">${lastRecovery}%</div><div class="stat-sub">avg ${avg(rScore).toFixed(0)}%</div></div>
    <div class="stat-card"><div class="stat-label">HRV</div><div class="stat-value">${avg(hrvVals).toFixed(1)}</div><div class="stat-sub">ms · RMSSD</div></div>
    <div class="stat-card"><div class="stat-label">Workouts</div><div class="stat-value">${workouts.length}</div><div class="stat-sub">logged</div></div>
  `;

  const gridOpt={color:GRID};
  const animOpt={duration:1200, easing:'easeOutQuart', delay:ctx=>ctx.dataIndex*35};
  
  // Strain chart
  new Chart(document.getElementById('strainChart'),{
    type:'bar',
    data:{labels:cLabels, datasets:[{label:'Strain', data:cStrain,
      backgroundColor:cStrain.map(v=>v>=10?PINK:v>=7?PURPLE:TEAL),
      borderRadius:5, hoverBackgroundColor:TEAL}]},
    options:{maintainAspectRatio:false, animation:animOpt,
      plugins:{legend:{display:false}, tooltip:{backgroundColor:'#1c1c2e',titleColor:'#e8e8f0',bodyColor:'#8a8aa3',borderColor:'#2a2a40',borderWidth:1,padding:10}},
      scales:{y:{beginAtZero:true,grid:gridOpt}, x:{grid:{display:false}}}}
  });
  
  // Recovery chart
  new Chart(document.getElementById('recoveryChart'),{
    type:'line',
    data:{labels:rLabels, datasets:[{label:'Recovery %', data:rScore,
      borderColor:GREEN, backgroundColor:'rgba(0,217,163,.12)', fill:true, tension:.4, pointRadius:3, pointHoverRadius:5}]},
    options:{maintainAspectRatio:false, animation:{duration:1000, easing:'easeOutQuart'},
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,max:100,grid:gridOpt}, x:{grid:{display:false}}}}
  });
  
  // HRV + RHR
  const hrvData = recovery.map(x=>x.score?.hrv_rmssd_milli||null);
  const rhrData = recovery.map(x=>x.score?.resting_heart_rate||null);
  new Chart(document.getElementById('hrvChart'),{
    type:'line',
    data:{labels:rLabels, datasets:[
      {label:'HRV', data:hrvData, borderColor:PURPLE, tension:.4, pointRadius:2, pointHoverRadius:4, yAxisID:'y'},
      {label:'RHR', data:rhrData, borderColor:PINK, tension:.4, pointRadius:2, pointHoverRadius:4, yAxisID:'y1'}
    ]},
    options:{maintainAspectRatio:false, animation:{duration:1000, easing:'easeOutQuart'},
      plugins:{legend:{display:true,labels:{boxWidth:12}}},
      scales:{y:{position:'left',grid:gridOpt}, y1:{position:'right',grid:{display:false}}, x:{grid:{display:false}}}}
  });
  
  // Sleep
  const sleepMain = sleep.filter(s=>!s.score?.nap);
  const sleepLabels = sleepMain.map(s=>fmt(new Date(s.start)));
  const sleepPerf = sleepMain.map(s=>s.score?.sleep_performance_percentage||0);
  new Chart(document.getElementById('sleepChart'),{
    type:'bar',
    data:{labels:sleepLabels, datasets:[{label:'Sleep Performance %', data:sleepPerf,
      backgroundColor:PURPLE, borderRadius:4, hoverBackgroundColor:TEAL}]},
    options:{maintainAspectRatio:false, animation:animOpt,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,max:100,grid:gridOpt}, x:{grid:{display:false}}}}
  });

}).catch(err=>{
  document.body.innerHTML='<div style="text-align:center;padding:80px 20px;color:#8a8aa3">No data yet — run the fetch script first.<br><code>python scripts/fetch_whoop.py</code></div>';
  console.error(err);
});
</script>
</body>
</html>
